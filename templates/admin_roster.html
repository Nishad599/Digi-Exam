{% extends "base.html" %}

{% block content %}
<div class="glass-panel w-[98%] max-w-none mx-auto mt-8 p-6 rounded-xl flex flex-col gap-4">

    <!-- Admin Navigation Tabs -->
    <div class="w-full flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-gray-200">
        <div class="flex space-x-2">
            <a href="/admin" class="px-4 py-2 font-bold text-sm rounded text-gray-600 hover:bg-gray-100">Exams Mgmt</a>
            <a href="/admin/roster" class="px-4 py-2 font-bold text-sm rounded bg-blue-600 text-white shadow">Roster &
                QR</a>
            <a href="/admin/students"
                class="px-4 py-2 font-bold text-sm rounded text-gray-600 hover:bg-gray-100 transition">Student DB</a>
            <a href="/admin/attendance"
                class="px-4 py-2 font-bold text-sm rounded text-gray-600 hover:bg-gray-100 transition">Attendance &
                Gate</a>
            <a href="/admin/monitor"
                class="px-4 py-2 font-bold text-sm rounded text-gray-600 hover:bg-gray-100 transition">Global
                Monitor</a>
            <a href="/admin/conductors"
                class="px-4 py-2 font-bold text-sm rounded text-gray-600 hover:bg-gray-100 transition">Conductors</a>
        </div>
        <button onclick="logout()"
            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-bold uppercase rounded shadow transition cursor-pointer">Security
            Logout</button>
    </div>

    <div class="flex flex-col md:flex-row gap-6">
        <!-- Left Sidebar Operations -->
        <div class="w-full md:w-1/3 flex flex-col gap-4">
            <!-- Bulk Upload Authorized Roster -->
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-2 border-b pb-2">1. Upload Authorized Roster (CSV)</h3>
                <form onsubmit="uploadBulkRoster(event)" class="space-y-3">
                    <input type="number" id="rosterExamId" required placeholder="Exam ID"
                        class="w-full px-3 py-2 border rounded text-sm mb-2">
                    <label class="block text-xs font-semibold text-gray-700">CSV Format: reg_no, name, email, center,
                        date, session</label>
                    <input type="file" id="rosterCsv" accept=".csv" required
                        class="mt-1 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 mx-auto">
                    <button type="submit"
                        class="w-full bg-green-600 text-white font-bold rounded py-2 text-sm hover:bg-green-700 shadow-md">Authorize
                        & Send Emails</button>
                </form>
            </div>

            <!-- Generate Hall Ticket -->
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-2 border-b pb-2">2. Generate Hall Ticket QR</h3>
                <div class="space-y-3">
                    <input type="number" id="genExamId" required placeholder="Exam ID"
                        class="w-full px-3 py-2 border rounded text-sm">
                    <input type="text" id="genRegNo" required placeholder="Candidate Reg No (e.g. 1001)"
                        class="w-full px-3 py-2 border rounded text-sm">
                    <button onclick="generateHT()"
                        class="w-full bg-purple-600 text-white font-bold rounded py-2 text-sm hover:bg-purple-700 shadow-md">Gen
                        QR
                        Code</button>
                </div>
                <div id="qrResult" class="mt-4 flex flex-col items-center"></div>
            </div>
        </div>

        <!-- Right Panel: Overview Tables -->
        <div class="w-full md:w-2/3 flex flex-col gap-4">
            <!-- Authorized Roster List -->
            <div
                class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden flex flex-col h-[85vh] max-h-[1050px]">
                <div
                    class="bg-gray-50 px-4 py-3 border-b font-bold text-sm text-gray-700 flex justify-between items-center z-20">
                    <span>Authorized Candidates Roster</span>
                    <div class="flex space-x-2">
                        <input type="number" id="viewRosterExamId" placeholder="Exam ID"
                            class="w-20 px-2 py-1 border rounded text-xs" value="1">
                        <button onclick="loadRosterList()"
                            class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold px-3 py-1 rounded text-xs transition shadow-sm">View</button>
                    </div>
                </div>
                <div class="overflow-y-auto flex-1 custom-scrollbar">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="sticky top-0 z-10">
                            <tr>
                                <th
                                    class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider bg-white border-b border-gray-200 shadow-sm">
                                    Candidate</th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider bg-white border-b border-gray-200 shadow-sm">
                                    Location Assigned</th>
                            </tr>
                        </thead>
                        <tbody id="rosterTbody" class="divide-y text-xs">
                            <tr>
                                <td colspan="2" class="text-center py-6 text-gray-400 italic">Select an Exam ID and
                                    click
                                    View</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/';
    }

    async function uploadBulkRoster(e) {
        e.preventDefault();
        const examId = document.getElementById('rosterExamId').value;
        const fd = new FormData();
        fd.append('csv_file', document.getElementById('rosterCsv').files[0]);
        const res = await fetch(`/api/admin/roster/bulk/${examId}`, { method: 'POST', body: fd });
        const result = await res.json();
        if (res.ok) {
            alert(result.imported + ' Candidates Authorized! ' + result.message);
            document.getElementById('viewRosterExamId').value = examId;
            loadRosterList();
        } else {
            alert('Error: ' + (result.detail || 'Failed to upload CSV.'));
        }
    }

    function generateHT() {
        const eId = document.getElementById('genExamId').value;
        const rNo = document.getElementById('genRegNo').value;
        if (!eId || !rNo) return alert('Enter both fields');

        const url = `/api/admin/hallticket/pdf?exam_id=${eId}&registration_no=${rNo}&t=${Date.now()}`;
        document.getElementById('qrResult').innerHTML = `
            <a href="${url}" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 font-bold rounded-lg shadow-sm w-full block mt-2 text-center text-sm transition">Download PDF Ticket</a>
        `;
    }

    async function loadRosterList() {
        const examId = document.getElementById('viewRosterExamId').value;
        if (!examId) return;
        const res = await fetch(`/api/admin/roster_list/${examId}`);
        const data = await res.json();
        const tbody = document.getElementById('rosterTbody');
        tbody.innerHTML = '';
        if (data.length === 0) tbody.innerHTML = '<tr><td colspan="2" class="text-center py-6 text-gray-500 font-medium">No candidates in roster.</td></tr>';

        data.forEach(r => {
            const qrUrl = `/api/admin/hallticket/pdf?exam_id=${examId}&registration_no=${r.reg_no}&t=${Date.now()}`;
            tbody.innerHTML += `
            <tr class="hover:bg-gray-50 transition">
                <td class="px-4 py-3 font-bold w-1/2">${r.name} <br><span class="font-normal text-gray-500">Reg: ${r.reg_no} | Email: ${r.email || 'None'}</span></td>
                <td class="px-4 py-3 w-1/2">
                    <div class="bg-blue-50 text-blue-800 border border-blue-200 px-3 py-2 flex flex-col rounded text-[11px] font-bold mb-1 shadow-sm leading-tight">
                        ${r.center}
                    </div>
                    <a href="${qrUrl}" target="_blank" class="text-indigo-600 font-bold hover:underline text-[10px]">&rarr; Download PDF Ticket</a>
                </td>
            </tr>`;
        });
    }

    window.onload = () => { loadRosterList(); }
</script>
{% endblock %}
