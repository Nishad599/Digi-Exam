{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-md mx-auto mt-8">
    <!-- Welcome Header -->
    <div class="text-center mb-8">
        <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 shadow-lg mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h2 class="text-3xl font-black text-gray-800">Student Login</h2>
        <p class="text-gray-500 mt-1 text-sm">Sign in to access your dashboard</p>
    </div>

    <!-- Login Card -->
    <div class="glass-panel p-8 rounded-2xl shadow-xl">
        <form action="/token" method="POST" class="space-y-5">
            <input type="hidden" name="login_type" value="student">

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Username</label>
                <input type="text" name="username" required autocomplete="username"
                    class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="Enter your username">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                    class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="Enter your password">
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black rounded-lg py-3.5 hover:from-blue-700 hover:to-indigo-800 shadow-lg transform active:scale-95 transition-all outline-none text-sm uppercase tracking-wider">
                Sign In
            </button>

            <div class="text-right mt-1">
                <a href="/forgot-password"
                    class="text-sm text-gray-500 hover:text-blue-600 transition font-medium">Forgot Password?</a>
            </div>
        </form>

        <!-- Success Banner (shown after password reset) -->
        <div id="successBanner"
            class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm text-center font-semibold">
            <svg class="w-5 h-5 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <span id="successText"></span>
        </div>

        <!-- Sign Up CTA -->
        <div class="mt-6 pt-6 border-t border-gray-200 text-center">
            <p class="text-sm text-gray-600">
                Don't have an account?
            </p>
            <a href="/register"
                class="inline-flex items-center mt-2 px-5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-blue-600 font-bold text-sm hover:bg-blue-50 hover:border-blue-200 transition-all group">
                <svg class="w-4 h-4 mr-2 text-blue-500 group-hover:scale-110 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                Create your universal profile
            </a>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        alert("Login Failed: " + urlParams.get('error'));
    }
    if (urlParams.has('success')) {
        const banner = document.getElementById('successBanner');
        document.getElementById('successText').textContent = urlParams.get('success');
        banner.classList.remove('hidden');
    }
</script>
{% endblock %}
