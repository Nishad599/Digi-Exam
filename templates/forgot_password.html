{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-md mx-auto mt-8">
    <!-- Header -->
    <div class="text-center mb-8">
        <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 shadow-lg mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
        </div>
        <h2 class="text-3xl font-black text-gray-800">Reset Password</h2>
        <p class="text-gray-500 mt-1 text-sm">We'll send a verification code to your email</p>
    </div>

    <div class="glass-panel p-8 rounded-2xl shadow-xl">

        <!-- ======= STEP 1: Enter Email ======= -->
        <div id="step1">
            <form id="otpForm" class="space-y-5" onsubmit="sendOTP(event)">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Registered
                        Email</label>
                    <input type="email" id="emailInput" required
                        class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all"
                        placeholder="Enter your registered email">
                </div>

                <button type="submit" id="sendOtpBtn"
                    class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-black rounded-lg py-3.5 hover:from-amber-600 hover:to-orange-700 shadow-lg transform active:scale-95 transition-all outline-none text-sm uppercase tracking-wider">
                    Send OTP
                </button>
            </form>

            <div id="otpSentMsg"
                class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm text-center font-semibold">
                <svg class="w-5 h-5 inline mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                OTP sent! Check your inbox.
            </div>
        </div>

        <!-- ======= STEP 2: Enter OTP + New Password ======= -->
        <div id="step2" class="hidden">
            <div class="mb-5 p-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm text-center">
                OTP sent to <strong id="maskedEmail"></strong>. Valid for 5 minutes.
            </div>

            <form id="resetForm" class="space-y-5" onsubmit="resetPassword(event)">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">OTP Code</label>
                    <input type="text" id="otpInput" required maxlength="6" pattern="[0-9]{6}"
                        class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all text-center text-2xl tracking-[0.5em] font-mono font-bold"
                        placeholder="------">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">New
                        Password</label>
                    <input type="password" id="newPassword" required minlength="6"
                        class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all"
                        placeholder="Min 6 characters">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Confirm
                        Password</label>
                    <input type="password" id="confirmPassword" required minlength="6"
                        class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all"
                        placeholder="Re-enter new password">
                </div>

                <button type="submit" id="resetBtn"
                    class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-black rounded-lg py-3.5 hover:from-amber-600 hover:to-orange-700 shadow-lg transform active:scale-95 transition-all outline-none text-sm uppercase tracking-wider">
                    Reset Password
                </button>
            </form>

            <button onclick="goBackToStep1()"
                class="w-full mt-3 text-sm text-gray-500 hover:text-amber-600 transition font-medium">
                &larr; Use a different email
            </button>
        </div>

        <!-- Error display -->
        <div id="errorMsg"
            class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm text-center font-semibold">
        </div>

        <!-- Back to login -->
        <div class="mt-6 pt-6 border-t border-gray-200 text-center">
            <a href="/" class="text-sm text-blue-600 font-bold hover:underline">&larr; Back to Student Login</a>
        </div>
    </div>
</div>

<script>
    let userEmail = '';

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function maskEmail(email) {
        const [user, domain] = email.split('@');
        if (user.length <= 2) return user[0] + '***@' + domain;
        return user[0] + '***' + user[user.length - 1] + '@' + domain;
    }

    function setLoading(btn, loading) {
        btn.disabled = loading;
        if (loading) {
            btn.dataset.originalText = btn.textContent;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>';
            btn.classList.add('opacity-75', 'cursor-not-allowed');
        } else {
            btn.textContent = btn.dataset.originalText;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    }

    async function sendOTP(e) {
        e.preventDefault();
        const email = document.getElementById('emailInput').value.trim();
        const btn = document.getElementById('sendOtpBtn');

        setLoading(btn, true);
        document.getElementById('errorMsg').classList.add('hidden');

        try {
            const resp = await fetch('/api/forgot-password/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            });
            const data = await resp.json();

            if (resp.ok) {
                userEmail = email;
                document.getElementById('maskedEmail').textContent = maskEmail(email);
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                showError(data.detail || 'Failed to send OTP');
            }
        } catch (err) {
            showError('Network error. Please try again.');
        } finally {
            setLoading(btn, false);
        }
    }

    async function resetPassword(e) {
        e.preventDefault();
        const otp = document.getElementById('otpInput').value.trim();
        const pw = document.getElementById('newPassword').value;
        const cpw = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('resetBtn');

        if (pw !== cpw) { showError('Passwords do not match.'); return; }
        if (pw.length < 6) { showError('Password must be at least 6 characters.'); return; }

        setLoading(btn, true);
        document.getElementById('errorMsg').classList.add('hidden');

        try {
            const resp = await fetch('/api/forgot-password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(userEmail)
                    + '&otp=' + encodeURIComponent(otp)
                    + '&new_password=' + encodeURIComponent(pw)
            });
            const data = await resp.json();

            if (resp.ok) {
                window.location.href = '/?success=Password reset successful. Please login.';
            } else {
                showError(data.detail || 'Reset failed.');
            }
        } catch (err) {
            showError('Network error. Please try again.');
        } finally {
            setLoading(btn, false);
        }
    }

    function goBackToStep1() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('errorMsg').classList.add('hidden');
    }
</script>
{% endblock %}
