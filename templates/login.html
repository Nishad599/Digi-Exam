{% extends "base.html" %}

{% block content %}
<div class="glass-panel w-full max-w-md mx-auto mt-12 p-8 rounded-2xl shadow-xl">
    <h2 class="text-3xl font-black text-center text-gray-800 mb-2">Admin Portal</h2>
    <p class="text-center text-gray-500 mb-6 text-sm">Authorized personnel only</p>

    <!-- Tab Controls -->
    <div class="flex border-b mb-6">
        <button type="button" id="tabAdmin" onclick="switchTab('admin')"
            class="w-1/2 py-2 text-center font-bold text-blue-600 border-b-2 border-blue-600 uppercase tracking-widest text-xs transition-all">Admin</button>
        <button type="button" id="tabConductor" onclick="switchTab('conductor')"
            class="w-1/2 py-2 text-center font-bold text-gray-400 border-b-2 border-transparent hover:text-blue-500 uppercase tracking-widest text-xs transition-all">Conductor</button>
    </div>

    <!-- Login Form -->
    <form action="/token" method="POST" class="space-y-5">
        <input type="hidden" name="login_type" id="loginType" value="admin">

        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Username</label>
            <input type="text" name="username" required autocomplete="username"
                class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Enter admin username">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Password</label>
            <input type="password" name="password" required autocomplete="current-password"
                class="block w-full px-4 py-3 border border-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Enter password">
        </div>

        <button type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black rounded-lg py-3 hover:from-blue-700 hover:to-indigo-800 shadow-lg transform active:scale-95 transition-all outline-none">
            Secure Login
        </button>
    </form>



    <script>
        function switchTab(type) {
            document.getElementById('loginType').value = type;
            const tabs = ['tabAdmin', 'tabConductor'];
            tabs.forEach(id => {
                const t = document.getElementById(id);
                if (t) {
                    t.classList.remove('text-blue-600', 'border-blue-600');
                    t.classList.add('text-gray-400', 'border-transparent');
                }
            });
            const active = document.getElementById('tab' + type.charAt(0).toUpperCase() + type.slice(1));
            if (active) {
                active.classList.add('text-blue-600', 'border-blue-600');
                active.classList.remove('text-gray-400', 'border-transparent');
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            alert("Login Failed: " + urlParams.get('error'));
        }
    </script>
    {% endblock %}
